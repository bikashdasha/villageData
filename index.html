// LOAD FUNCTION WITH DYNAMIC "X" HIGHLIGHT
function loadTableData() {
  document.getElementById('tableHead').innerHTML = tableHeader;
  
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = tableData;

  // Dynamically highlight cells with "X"
  const rows = tbody.getElementsByTagName('tr');
  for (let row of rows) {
    const cells = row.getElementsByTagName('td');
    // Start from 4th column (April and future months)
    for (let i = 3; i < cells.length; i++) {
      if (cells[i].textContent.trim() === 'X' || cells[i].textContent.trim() === 'x') {
        cells[i].classList.add('x-cell');
      }
    }
  }
}

// BUTTON

<style>
/* ====================== REGISTER POPUP ====================== */
.popup-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 1000;
  align-items: center;

  padding: 15px;

.popup-content {
  background: white;
  width: 100%;
  max-width: 1280px;
  max-height: 95vh;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.popup-header {
  padding: 20px 25px;
  background: #006633;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.popup-header h2 {
  margin: 0;
  font-size: 2.3rem;
}

.close-btn {
  font-size: 32px;
  color: white;
  background: none;
  border: none;
  cursor: pointer;
}

.table-container {
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(95vh - 80px);
  padding: 5px;
}

.register-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 1.45rem;
  background: white;
}

.register-table th,
.register-table td {
  padding: 12px 10px;
  border: 1px solid #555;
  white-space: nowrap;
  text-align: left;
}

.register-table th {
  background: #006633;
  color: white;
  position: sticky;
  top: 0;
  z-index: 20;
  text-align: center;
  font-weight: 700;
}

/* Fixed Bottom Rows */
.row-62 { 
  position: sticky; 
  bottom: 48px; 
  z-index: 15; 
}
.row-63 { 
  position: sticky; 
  bottom: 0; 
  z-index: 16; 
}

/* Column Alignment */
.register-table td:nth-child(1),
.register-table td:nth-child(3),
.register-table td:nth-child(4) { text-align: center; }

.register-table td:nth-child(2) { text-align: left; }

/* "X" Highlight - Light Red */
.x-cell {
  background-color: #ffebee !important;
  color: #f80505 !important;
  font-weight: 600;
}

/* Special Rows */
.row-62 {
  background-color: #fff9c4 !important;
}
.row-62 td { color: #b71c1c !important; font-weight: 700; }

.row-63 {
  background-color: #d4edda !important;
}
.row-63 td { color: #1b5e20 !important; font-weight: 700; }

/* Mobile */
@media (max-width: 400px) {
  .register-table th, .register-table td {
    padding: 10px 6px;
    font-size: 1.32rem;
  }
}
